<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>No Popups</title>
    <link rel="stylesheet" href="style.css" />
  </head>
  <body>
    <div class="popup">
      <header class="header">
        <div class="title">No Popups</div>
        <div id="statusBadge" class="badge badge--on" aria-live="polite">ON</div>
      </header>

      <main class="card">
        <div class="countRow">
          <div class="countLabel">Blocked popups</div>
          <div id="block" class="countValue">0</div>
        </div>

        <div class="divider" role="separator" aria-hidden="true"></div>

        <div class="toggleRow">
          <div class="toggleText">
            <div class="toggleLabel">Mode</div>
            <div class="toggleHint">Pick what works best per site</div>
          </div>

          <select id="modeSelect" class="select" aria-label="Blocking mode">
            <option value="off">Off</option>
            <option value="normal">Normal</option>
            <option value="ultra">Ultra</option>
          </select>
        </div>
      </main>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
